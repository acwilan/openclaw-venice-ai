name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check model catalogs
        run: npm run check-model-catalogs

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Check model catalog drift
        run: npm run check-model-catalogs:drift
